<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Security Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            padding: 24px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            border-bottom: 1px solid #21262d;
            padding-bottom: 16px;
        }

        header h1 { font-size: 1.4rem; color: #f0f6fc; }

        #connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        #status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #3d444d;
            transition: background 0.3s;
        }

        #status-dot.connected    { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
        #status-dot.disconnected { background: #f85149; }

        #alerts-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .alert-card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .alert-card.WARNING { border-left: 4px solid #d29922; }
        .alert-card.BLOCKED { border-left: 4px solid #f85149; }

        .badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .badge.WARNING { background: #3d2e0a; color: #d29922; }
        .badge.BLOCKED { background: #3d0e0e; color: #f85149; }

        .alert-info { flex: 1; }
        .alert-ip   { font-weight: 600; color: #f0f6fc; font-size: 1rem; }
        .alert-msg  { font-size: 0.85rem; color: #8b949e; margin-top: 2px; }

        .alert-time {
            font-size: 0.78rem;
            color: #484f58;
            white-space: nowrap;
        }

        #empty-state {
            text-align: center;
            color: #484f58;
            padding: 64px 0;
            font-size: 0.95rem;
        }

        #empty-state span { font-size: 2rem; display: block; margin-bottom: 8px; }
    </style>
</head>
<body>

<header>
    <h1>🛡️ Adaptive Security Dashboard</h1>
    <div id="connection-status">
        <div id="status-dot"></div>
        <span id="status-text">Connecting...</span>
    </div>
</header>

<div id="alerts-container">
    <div id="empty-state">
        <span>🔍</span>
        Monitoring active — no alerts yet.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const container  = document.getElementById('alerts-container');
    const emptyState = document.getElementById('empty-state');

    const socket      = new SockJS('/ws');
    const stompClient = Stomp.over(socket);
    stompClient.debug = null; // disable console noise

    stompClient.connect({}, function () {
        statusDot.className  = 'connected';
        statusText.textContent = 'Connected';

        stompClient.subscribe('/topic/alerts', function (message) {
            const event = JSON.parse(message.body);
            renderAlert(event);
        });
    }, function () {
        statusDot.className  = 'disconnected';
        statusText.textContent = 'Disconnected';
    });

    function renderAlert(event) {
        if (emptyState) emptyState.remove();

        const time = new Date(event.timestamp).toLocaleTimeString();

        const card = document.createElement('div');
        card.className = 'alert-card ' + event.status;
        card.innerHTML = `
            <span class="badge ${event.status}">${event.status}</span>
            <div class="alert-info">
                <div class="alert-ip">${event.ipAddress}</div>
                <div class="alert-msg">${event.message}</div>
            </div>
            <div class="alert-time">${time}</div>
        `;

        container.prepend(card);
    }
</script>
</body>
</html>
