spring.application.name=adaptive-security-policy-api
server.port=8090

## ─── Brute Force Detection ───────────────────────────────────────────────────
#security.brute-force.warning-threshold=5
#security.brute-force.block-threshold=10
#security.brute-force.scheduler-interval-ms=60000
security.brute-force.warning-threshold=3
security.brute-force.block-threshold=6
security.brute-force.scheduler-interval-ms=15000
# Only count failed attempts from the last N minutes — prevents stale log entries from re-blocking unblocked IPs
security.brute-force.detection-window-minutes=60

# ─── Alert Settings ──────────────────────────────────────────────────────────
# Comma-separated list of admin email recipients
security.alerts.recipients=your-admin@example.com
security.alerts.console-url=http://localhost:8090/swagger-ui.html

# ─── Gmail SMTP ──────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true