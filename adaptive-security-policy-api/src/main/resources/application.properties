spring.application.name=adaptive-security-policy-api
server.port=8090
# Include exception messages in error responses so the frontend can surface validation errors
server.error.include-message=always

# ─── Database (PostgreSQL) ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
# Hibernate auto-creates/updates tables from the @Entity classes (dev convenience).
# For production you'd switch to 'validate' + Flyway/Liquibase migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.show-sql=true

# ─── Keycloak (OAuth2 Resource Server) ───────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/adaptive-security-policy

## ─── Brute Force Detection ───────────────────────────────────────────────────
# warning-threshold / block-threshold / detection-window-minutes / auto-block-enabled
# below are SEED DEFAULTS only — they populate the security_policy row on first run.
# After that they're editable at runtime via PUT /api/policy (the DB value wins).
security.brute-force.warning-threshold=3
security.brute-force.block-threshold=6
# Master switch for automatic blocking — when false the system still warns but never auto-blocks
security.brute-force.auto-block-enabled=true
# Only count failed attempts from the last N minutes — prevents stale log entries from re-blocking unblocked IPs
security.brute-force.detection-window-minutes=60
# Scheduler cadence stays static (not part of the editable policy)
security.brute-force.scheduler-interval-ms=15000

# ─── Detectors (multi-service detection) ──────────────────────────────────────
# Each detector feeds the same warn/block pipeline; toggle them independently.
security.detectors.ssh-bruteforce.enabled=true
security.detectors.ssh-probe.enabled=true
security.detectors.port-scan.enabled=true
# Port scan needs an iptables LOG rule on the host with this prefix; an IP that
# hits at least min-ports distinct destination ports in the window is flagged.
security.detectors.port-scan.log-prefix=ASP-SCAN
security.detectors.port-scan.min-ports=5
# Connection flood: an IP holding at least min-connections established TCP sockets
# is flagged. Off by default — busy legitimate clients (proxies, NAT) can hold many.
security.detectors.conn-flood.enabled=false
security.detectors.conn-flood.min-connections=50

# ─── Port Knocking (Module 4) ─────────────────────────────────────────────────
security.port-knocking.enabled=true
# Secret knock sequence — the client must hit these ports in this exact order
security.port-knocking.sequence=8936,6027,9417
# Port that opens after a successful knock (22 = SSH)
security.port-knocking.protected-port=22
# Max time allowed between knocks before progress resets
security.port-knocking.timeout-ms=5000
# How long the protected port stays open after a successful knock
security.port-knocking.open-duration-seconds=30

# ─── Gemini (AI firewall assistant) ───────────────────────────────────────────
gemini.base-url=https://generativelanguage.googleapis.com
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

# ─── Alert Settings ──────────────────────────────────────────────────────────
# Comma-separated list of admin email recipients
security.alerts.recipients=your-admin@example.com
security.alerts.console-url=http://localhost:8090/swagger-ui.html

# ─── Gmail SMTP ──────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true