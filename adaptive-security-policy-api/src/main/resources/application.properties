spring.application.name=adaptive-security-policy-api
server.port=8090

# ─── Database (PostgreSQL) ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
# Hibernate auto-creates/updates tables from the @Entity classes (dev convenience).
# For production you'd switch to 'validate' + Flyway/Liquibase migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.show-sql=true

# ─── Keycloak (OAuth2 Resource Server) ───────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/adaptive-security-policy

## ─── Brute Force Detection ───────────────────────────────────────────────────
#security.brute-force.warning-threshold=5
#security.brute-force.block-threshold=10
#security.brute-force.scheduler-interval-ms=60000
security.brute-force.warning-threshold=3
security.brute-force.block-threshold=6
security.brute-force.scheduler-interval-ms=15000
# Only count failed attempts from the last N minutes — prevents stale log entries from re-blocking unblocked IPs
security.brute-force.detection-window-minutes=60

# ─── Port Knocking (Module 4) ─────────────────────────────────────────────────
security.port-knocking.enabled=true
# Secret knock sequence — the client must hit these ports in this exact order
security.port-knocking.sequence=8936,6027,9417
# Port that opens after a successful knock (22 = SSH)
security.port-knocking.protected-port=22
# Max time allowed between knocks before progress resets
security.port-knocking.timeout-ms=5000
# How long the protected port stays open after a successful knock
security.port-knocking.open-duration-seconds=30

# ─── Alert Settings ──────────────────────────────────────────────────────────
# Comma-separated list of admin email recipients
security.alerts.recipients=your-admin@example.com
security.alerts.console-url=http://localhost:8090/swagger-ui.html

# ─── Gmail SMTP ──────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true