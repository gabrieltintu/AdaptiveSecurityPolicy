spring.application.name=adaptive-security-policy-api
server.port=8090

server.error.include-message=always


spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
# Hibernate auto-creates/updates tables from the @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.show-sql=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/adaptive-security-policy

# warning-threshold / block-threshold / detection-window-minutes / auto-block-enabled
security.brute-force.warning-threshold=3
security.brute-force.block-threshold=6

security.brute-force.auto-block-enabled=true

security.brute-force.detection-window-minutes=60

security.brute-force.scheduler-interval-ms=10000

security.detectors.ssh-bruteforce.enabled=true
security.detectors.ssh-probe.enabled=true
security.detectors.port-scan.enabled=true


security.detectors.port-scan.log-prefix=ASP-SCAN
security.detectors.port-scan.min-ports=5


security.detectors.conn-flood.enabled=false
security.detectors.conn-flood.min-connections=50


security.port-knocking.enabled=true
security.port-knocking.sequence=8936,6027,9417
security.port-knocking.protected-port=22
security.port-knocking.timeout-ms=5000
security.port-knocking.open-duration-seconds=30
gemini.base-url=https://generativelanguage.googleapis.com
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash


security.alerts.recipients=your-admin@example.com
security.alerts.console-url=http://localhost:8090/swagger-ui.html

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true